<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ozon Multiverse: Music Edition</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: sans-serif;
            touch-action: none; color: white;
            background-repeat: repeat-y;
            background-position: center 0px;
        }

        #main-menu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('InShot_20260315_020539529.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }

        .menu-card {
            background: rgba(249, 17, 85, 0.3); border: 2px solid #f91155;
            padding: 15px; margin: 10px; border-radius: 15px;
            width: 280px; text-align: center; cursor: pointer;
            transition: 0.3s; backdrop-filter: blur(8px);
        }

        #ui {
            position: absolute; top: 20px; left: 20px;
            font-size: 18px; font-weight: bold; z-index: 10;
            background: rgba(0, 0, 0, 0.7); padding: 15px;
            border-radius: 20px; display: none; border: 1px solid #f91155;
        }

        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95);
            padding: 40px; text-align: center; border-radius: 20px;
            border: 5px solid #f91155; z-index: 110;
        }

        button {
            background: #f91155; color: white; border: none;
            padding: 15px 30px; font-size: 18px; border-radius: 10px;
            cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color: #f91155; text-shadow: 2px 2px 10px #000; font-size: 32px; margin-bottom: 20px;">OTEC ARCADE</h1>
    
    <div class="menu-card" onclick="startGame('runner')">
        <h3>Перекус на работе</h3>
        <small>Рекорд: <span id="record-runner">0</span></small>
    </div>

    <div class="menu-card" onclick="startGame('space')">
        <h3>Космический ужин</h3>
        <small>Рекорд: <span id="record-space">0</span></small>
    </div>

    <div class="menu-card" style="border-color: #00e5ff;" onclick="startGame('jump')">
        <h3 style="color: #00e5ff;">Прыжок в Озон</h3>
        <p></p>
        <small>Рекорд: <span id="record-jump">0</span></small>
    </div>
</div>

<div id="ui">
    ОЧКИ: <span id="score">0</span> | ❤️: <span id="lives">4</span>
</div>

<div id="game-over">
    <h1 style="color: #f91155;">КОНЕЦ ИГРЫ</h1>
    <p>Счет: <span id="final-score">0</span></p>
    <button onclick="location.reload()">В МЕНЮ</button>
</div>

<audio id="musicRunner" loop src="Mayhem — Night Music (8-bit) (www.lightaudio.ru).mp3"></audio>
<audio id="musicSpace" loop src="8 БИТНАЯ МУЗЫКА — ПРИКОЛЬНАЯ (www.lightaudio.ru).mp3"></audio>
<audio id="musicJump" loop src="8-Bit Universe — Radioactive (www.lightaudio.ru).mp3"></audio>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const musics = {
    runner: document.getElementById("musicRunner"),
    space: document.getElementById("musicSpace"),
    jump: document.getElementById("musicJump")
};

let currentGameMode = null;
let score = 0, lives = 4, isGameOver = false;
let items = [], platforms = [], enemies = [];
let bgPosY = 0; 
let targetX = null;

const records = {
    runner: localStorage.getItem('ozonHighscore_runner') || 0,
    space: localStorage.getItem('ozonHighscore_space') || 0,
    jump: localStorage.getItem('ozonHighscore_jump') || 0
};

const sprites = {
    player: new Image(), bread: new Image(),
    enemyDefault: new Image(), // Обычный враг для Runner/Space
    enemyJump: new Image(),    // Уникальный враг для Doodle Jump
    cigs: new Image(),
    platform: new Image(), rocket: new Image()
};

sprites.player.src = 'InShot_20260315_002246223.png';
sprites.bread.src = 'InShot_20260315_002235078.png';
sprites.cigs.src = 'InShot_20260315_002223501.png';
sprites.platform.src = 'InShot_20260315_110336789.png';
sprites.rocket.src = 'InShot_20260315_105349816.png';

// УСТАНОВКА СПРАЙТОВ ВРАГОВ
sprites.enemyDefault.src = 'InShot_20260315_002113104.png'; // Для старых режимов
sprites.enemyJump.src = 'InShot_20260315_105400086.png';    // ДЛЯ ДУДЛ ДЖАМП

const player = { x: 0, y: 0, w: 60, h: 80, speed: 10, dx: 0, dy: 0, jumpForce: -16, gravity: 0.6 };

function startGame(mode) {
    currentGameMode = mode;
    score = 0; lives = (mode === 'jump' ? 1 : 4);
    items = []; platforms = []; enemies = [];
    isGameOver = false; bgPosY = 0;
    
    Object.values(musics).forEach(m => { m.pause(); m.currentTime = 0; });

    if (mode === 'jump') {
        player.x = canvas.width / 2;
        player.y = canvas.height - 150;
        player.dy = player.jumpForce;
        document.body.style.backgroundImage = "url('1773560204419.png')";
        document.body.style.backgroundSize = "cover";
        musics.jump.play();
        initJumpPlatforms();
    } else {
        document.body.style.backgroundImage = mode === 'runner' ? "url('1773522089236.png')" : "none";
        if(mode === 'space') document.body.style.backgroundColor = "#020010";
        musics[mode].play();
        spawnItem();
    }

    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    requestAnimationFrame(gameLoop);
}

function initJumpPlatforms() {
    platforms = [{ x: canvas.width/2 - 50, y: canvas.height - 50, w: 100, h: 30, hasRocket: false }];
    for(let i=0; i<10; i++) spawnPlatform();
}

function spawnPlatform() {
    const lastY = platforms.length > 0 ? platforms[platforms.length-1].y : canvas.height;
    platforms.push({
        x: Math.random() * (canvas.width - 100),
        y: lastY - (130 + Math.random() * 50),
        w: 100, h: 30, hasRocket: Math.random() < 0.15
    });
    if (Math.random() < 0.2) {
        enemies.push({ x: Math.random()*canvas.width, y: lastY - 300, w: 70, h: 90, speed: Math.random() > 0.5 ? 2 : -2 });
    }
}

function update() {
    if (currentGameMode === 'jump') {
        player.dy += player.gravity;
        player.y += player.dy;

        if (targetX !== null) {
            let diffX = targetX - player.x;
            if (Math.abs(diffX) > 5) player.x += Math.sign(diffX) * player.speed;
        }

        if (player.x > canvas.width) player.x = -player.w;
        if (player.x < -player.w) player.x = canvas.width;

        if (player.dy > 0) {
            platforms.forEach(p => {
                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20) {
                    player.dy = player.jumpForce;
                }
            });
        }

        platforms.forEach(p => {
            if (p.hasRocket && player.x + player.w > p.x + 20 && player.x < p.x + 80 &&
                player.y + player.h > p.y - 70 && player.y < p.y) {
                p.hasRocket = false;
                player.dy = -40;
            }
        });

        enemies.forEach(en => {
            en.x += en.speed;
            if (en.x > canvas.width || en.x < -en.w) en.speed *= -1;
            if (player.x < en.x + en.w - 15 && player.x + player.w > en.x + 15 &&
                player.y < en.y + en.h - 15 && player.y + player.h > en.y + 15) gameOver();
        });

        if (player.y < canvas.height / 2) {
            let diff = canvas.height / 2 - player.y;
            player.y = canvas.height / 2;
            score += Math.floor(diff / 10);
            platforms.forEach(p => p.y += diff);
            enemies.forEach(en => en.y += diff);
            bgPosY += diff * 0.3; 
            document.body.style.backgroundPositionY = bgPosY + "px";
        }

        if (platforms[0] && platforms[0].y > canvas.height) {
            platforms.shift();
            spawnPlatform();
        }
        if (player.y > canvas.height + 100) gameOver();
        document.getElementById('score').innerText = score;

    } else {
        player.x = Math.max(0, Math.min(canvas.width - player.w, player.x + player.dx));
        player.y = Math.max(0, Math.min(canvas.height - player.h, player.y + player.dy));
        if (targetX !== null) player.x += (targetX - player.x) * 0.1;

        items.forEach((it, i) => {
            if (currentGameMode === 'runner') it.y += it.speed; else it.x -= it.speed;
            if (it.x < player.x + player.w - 15 && it.x + it.w > player.x + 15 &&
                it.y < player.y + player.h - 15 && it.y + it.h > player.y + 15) {
                if (it.type === 'bread') score += 10;
                else if (it.type === 'enemy') lives--;
                else if (it.type === 'cigs') lives = Math.min(4, lives + 1);
                items.splice(i, 1);
                if (lives <= 0) gameOver();
            }
        });
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (currentGameMode === 'jump') {
        platforms.forEach(p => {
            ctx.drawImage(sprites.platform, p.x, p.y, p.w, p.h);
            if (p.hasRocket) ctx.drawImage(sprites.rocket, p.x + 20, p.y - 70, 60, 70);
        });
        // ОТРИСОВКА УНИКАЛЬНОГО ВРАГА ДЛЯ ДЖАМПА
        enemies.forEach(en => ctx.drawImage(sprites.enemyJump, en.x, en.y, en.w, en.h));
    }
    ctx.drawImage(sprites.player, player.x, player.y, player.w, player.h);
    
    if (currentGameMode !== 'jump') {
        items.forEach(it => {
            let img = sprites.bread;
            // ОТРИСОВКА ОБЫЧНОГО ВРАГА ДЛЯ ОСТАЛЬНЫХ РЕЖИМОВ
            if (it.type === 'enemy') img = sprites.enemyDefault;
            if (it.type === 'cigs') img = sprites.cigs;
            ctx.drawImage(img, it.x, it.y, it.w, it.h);
        });
    }
}

function spawnItem() {
    if (isGameOver || currentGameMode === 'jump') return;
    const type = Math.random() > 0.7 ? (Math.random() > 0.8 ? 'cigs' : 'enemy') : 'bread';
    items.push({ x: Math.random()*canvas.width, y: -50, w: 60, h: 60, type, speed: 5 + score/100 });
    setTimeout(spawnItem, 800);
}

function gameLoop() {
    if (isGameOver) return;
    update(); draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    isGameOver = true;
    Object.values(musics).forEach(m => m.pause());
    if (score > records[currentGameMode]) localStorage.setItem('ozonHighscore_' + currentGameMode, score);
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('final-score').innerText = score;
}

canvas.addEventListener('pointerdown', e => { targetX = e.clientX - player.w/2; });
canvas.addEventListener('pointermove', e => { targetX = e.clientX - player.w/2; });
canvas.addEventListener('pointerup', () => { targetX = null; });

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

document.getElementById('record-runner').innerText = records.runner;
document.getElementById('record-space').innerText = records.space;
document.getElementById('record-jump').innerText = records.jump;
</script>
</body>
</html>
